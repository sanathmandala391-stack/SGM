<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="google-site-verification" content="y6FNxqctYBVeomwWak9HlIeg5sQFg_roI8ybt9imzaI" />

    <title>SGM | Student Management System</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <div id="visitor-counter" style="font-weight:bold; text-align:center; margin-top:20px; font-family: sans-serif;">
      👀 Visitors today: <span id="visitCount">0</span>
    </div>

    <script>
      const namespace = "mycollegeportal";
      const key = "daily_visits";
      const today = new Date().toISOString().split('T')[0];

      const savedDate = localStorage.getItem("visitDate");
      if (savedDate !== today) {
        localStorage.setItem("visitDate", today);
        // We use a fallback because the API might be slow
        fetch(`https://api.countapi.xyz/create?namespace=${namespace}&key=${key}${today}&value=0`).catch(() => {});
      }

      fetch(`https://api.countapi.xyz/hit/${namespace}/${key}${today}`)
        .then(res => res.json())
        .then(data => {
          if (data && data.value) {
            document.getElementById("visitCount").textContent = data.value;
          }
        })
        .catch(err => console.log("Counter currently unavailable"));
    </script>
  </body>
</html>
